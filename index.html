<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Tiny Island</title>
</head>
<body id="body">
    <!-- Start Screen -->
    <div id="startScreen">
        <div id="logo">
            <img src="assets/logo.svg" alt="Tiny Island" decoding="async" width="400" height="auto"/>
            <h1>Version Alpha 1.3.2</h1>
        </div>
        <button id="startButton">Start</button>
        <div id="text">
            <p>
                Designed & Developed by Michael A Davis
                <br>
                Music by Jet Intelligence
            </p>
            <a href="https://github.com/michael-a-davis/tiny-island" target="_blank">
                <img src="assets/socials/github.svg" alt="Github logo" decoding="async" width=50 height="50">
            </a>
        </div>
    </div>

    <!-- Top Bar-->
    <div id="topBar">
        <button class="button" id="menuButton" aria-label="Menu Button">
            <img src="assets/icons/menu.svg" class="icon" alt="menu icon" decoding="async" width="40px" height="40px"/>
        </button>
        <button class="button" id="hintButton" aria-label="Hint button">?</button>
    </div>

    <!-- Menus -->
    <div id="hintBox" class="menu">
        <h2>HINT:</h2>
        <p id="hintText">Did you know you can close menus with the B button?</p>
    </div>

    <div id="craftingMenu" class="hidden menu">
        <h2>Crafting Menu</h2>
        <div class="crafting-column" id="inventoryColumn">
            <p>Inventory:</p>
            <ul id="inventoryList"></ul>
        </div>
        <div class="crafting-column" id="outputColumn">
            <p>Craft:</p>
            <ul id="possibleCrafts">
            </ul>
        </div>
    </div>

    <div id="optionsMenu" class="hidden menu">
        <h2>Options</h2>
        <div class="option-group">
            <p>Music:</p>
            <label class="switch">
                <input type="checkbox" id="musicCheck" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div id="grid">
        <div class="grid-layer" id="playerGrid"></div>
        <div class="grid-layer" id="islandGrid"></div>
    </div>

    <div id="controlsBox">
        <div id="gameLog">
            <p id="logText"></p>
        </div>
        <div id="buttonsBox">
            <div class="button-group">
                <button class="button" id="upButton" aria-label="Up button">
                    <img  class="icon" src="assets/icons/arrow-up.svg" alt="Up arrow" width="40px" height="40px">
                </button>
                <button class="button" id="downButton" aria-label="Down button">
                    <img  class="icon" src="assets/icons/arrow-down.svg" alt="Down arrow" width="40px" height="40px">
                </button>
                <button class="button" id="leftButton" aria-label="Left button">
                    <img  class="icon" src="assets/icons/arrow-left.svg" alt="Left arrow" width="40px" height="40px">
                </button>
                <button class="button" id="rightButton" aria-label="Right button">
                    <img  class="icon" src="assets/icons/arrow-right.svg" alt="Left arrow" width="40px" height="40px">
                </button>
            </div>
            <button class="button" id="craftButton" aria-label="Craft button">
                <img  class="icon" src="assets/icons/hammer.svg" alt="Left arrow" width="40px" height="40px">
            </button>
            <div class="button-group">
                <button class="button" id="aButton" aria-label="A button">
                    <p>A</p>
                </button>
                <button class="button" id="bButton" aria-label="B button">
                    <p>B</p>
                </button>
                <button class="button" id="xButton" aria-label="X button">
                    <p>X</p>
                </button>
                <button class="button" id="yButton" aria-label="Y button">
                    <p>Y</p>
                </button>
            </div>
        </div>
    </div>

    <!-- Music -->
    <audio src="audio/sort-isle.wav" id="bgm" loop></audio>

    <!-- Scripts -->
    <script src="src/config.js"></script>
    <script src="src/data.js"></script>
    <script src="src/grid.js"></script>
    <script src="src/gui.js"></script>
    <script src="src/controls.js"></script>
    <script src="src/actions.js"></script>
    <script src="src/craft.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
